name: Backup Neon DB

on:
  schedule:
    - cron: "0 3 * * *"      # daily at 3 AM UTC
  workflow_dispatch:
    inputs:
      name:
        description: "Backup name ('default' for meliori_timestamp)"
        required: false
        default: "default"

jobs:
  backup:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Run backup
        env:
          PYTHONUNBUFFERED: 1
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          python backup_db.py \
            --db-url "${{ secrets.NEON_DATABASE_URL }}" \
            --s3-endpoint "${{ vars.S3_ENDPOINT }}" \
            --s3-bucket meliori \
            --name "${{ github.event.inputs.name || 'default' }}" \
            --keep 7
